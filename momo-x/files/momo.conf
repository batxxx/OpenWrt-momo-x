config config 'config'
	option 'init' '1'
	option 'enabled' '0'
	option 'profile' 'file:example.json'
	option 'start_delay' '0'
	option 'scheduled_restart' '0'
	option 'scheduled_restart_cron' '0 3 * * *'
	option 'scheduled_restart_mode' 'appointment'
	option 'scheduled_restart_weekday' '*'
	option 'scheduled_restart_time' '03:00'
	option 'scheduled_restart_interval' '1440'
	option 'subscription_scheduled_update' '0'
	option 'subscription_scheduled_update_cron' '0 4 * * *'
	option 'subscription_update_mode' 'appointment'
	option 'subscription_update_weekday' '*'
	option 'subscription_update_time' '04:00'
	option 'subscription_update_interval' '60'
	option 'test_profile' '1'
	option 'core_only' '0'

config procd 'procd'
	option 'fast_reload' '0'
	option 'quic_go_disable_gso_auto' '1'
	option 'enable_ujail' '0'

config local_subconverter 'local_subconverter'
	option 'enabled' '0'
	option 'port' '25500'
	option 'url' 'http://127.0.0.1:25500/sub'

config core 'core'
	option 'redirect_inbound_tag' 'redirect-in'
	option 'tproxy_inbound_tag' 'tproxy-in'
	option 'tun_inbound_tag' 'tun-in'
	option 'dns_inbound_tag' 'dns-in'
	option 'fake_ip_dns_server_tag' 'fake-ip-dns-server'

config mixin 'mixin'
	option 'log_disabled' '0'
	option 'log_level' 'info'
	option 'log_timestamp' '1'
	list 'dns_server' '119.29.29.29'
	option 'dns_fakeip' '1'
	option 'dns_independent_cache' '1'
	option 'dns_reverse_mapping' '1'
	option 'cache_enabled' '1'
	option 'cache_store_fakeip' '1'
	option 'cache_store_rdrc' '1'
	option 'external_control_ui_path' 'ui'
	option 'external_control_ui_download_url' 'https://github.com/Zephyruso/zashboard/releases/latest/download/dist-cdn-fonts.zip'
	option 'external_control_ui_download_detour' 'direct'
	option 'external_control_api_listen' '0.0.0.0:9090'

config proxy 'proxy'
	option 'enabled' '1'
	option 'ipv4_dns_hijack' '1'
	option 'ipv6_dns_hijack' '1'
	option 'ipv4_proxy' '1'
	option 'ipv6_proxy' '1'
	option 'fake_ip_ping_hijack' '1'
	option 'tcp_mode' 'tun'
	option 'udp_mode' 'tun'
	option 'router_proxy' '1'
	option 'lan_proxy' '1'
	list 'lan_inbound_interface' 'lan'
	list 'reserved_ip' '0.0.0.0/8'
	list 'reserved_ip' '10.0.0.0/8'
	list 'reserved_ip' '127.0.0.0/8'
	list 'reserved_ip' '100.64.0.0/10'
	list 'reserved_ip' '169.254.0.0/16'
	list 'reserved_ip' '172.16.0.0/12'
	list 'reserved_ip' '192.168.0.0/16'
	list 'reserved_ip' '224.0.0.0/4'
	list 'reserved_ip' '240.0.0.0/4'
	list 'reserved_ip6' '::/128'
	list 'reserved_ip6' '::1/128'
	list 'reserved_ip6' '::ffff:0:0/96'
	list 'reserved_ip6' '100::/64'
	list 'reserved_ip6' '64:ff9b::/96'
	list 'reserved_ip6' '2001::/32'
	list 'reserved_ip6' '2001:10::/28'
	list 'reserved_ip6' '2001:20::/28'
	list 'reserved_ip6' '2001:db8::/32'
	list 'reserved_ip6' '2002::/16'
	list 'reserved_ip6' 'fc00::/7'
	list 'reserved_ip6' 'fe80::/10'
	list 'reserved_ip6' 'ff00::/8'
	option 'bypass_china_mainland_ip' '0'
	option 'bypass_china_mainland_ip6' '0'
	option 'bypass_china_mainland_domain' '0'
	option 'bypass_geo_auto_update' '0'
	option 'bypass_geo_update_interval' 'weekly'
	option 'geoip_v4_url' 'https://raw.githubusercontent.com/gaoyifan/china-operator-ip/ip-lists/china.txt'
	option 'geoip_v6_url' 'https://raw.githubusercontent.com/gaoyifan/china-operator-ip/ip-lists/china6.txt'
	option 'geosite_cn_url' 'https://raw.githubusercontent.com/SagerNet/sing-geosite/rule-set/geosite-cn.srs'
	option 'geosite_update_interval' '168h'
	option 'geosite_download_detour' ''
	option 'proxy_tcp_dport' '0-65535'
	option 'proxy_udp_dport' '0-65535'
	list 'bypass_dscp' '4'
	option 'tun_timeout' '30'
	option 'tun_interval' '1'
	list 'router_dns_domain' 'github.io'
	list 'router_dns_domain' 'githubusercontent.com'
	list 'router_dns_domain' 'codeload.github.com'

config router_access_control
	option 'enabled' '1'
	list 'user' 'dnsmasq'
	list 'user' 'ftp'
	list 'user' 'logd'
	list 'user' 'nobody'
	list 'user' 'ntp'
	list 'user' 'ubus'
	list 'group' 'dnsmasq'
	list 'group' 'ftp'
	list 'group' 'logd'
	list 'group' 'nogroup'
	list 'group' 'ntp'
	list 'group' 'ubus'
	list 'cgroup' 'services/adguardhome'
	list 'cgroup' 'services/aria2'
	list 'cgroup' 'services/dnsmasq'
	list 'cgroup' 'services/netbird'
	list 'cgroup' 'services/qbittorrent'
	list 'cgroup' 'services/sysntpd'
	list 'cgroup' 'services/tailscale'
	list 'cgroup' 'services/zerotier'
	option 'dns' '0'
	option 'proxy' '0'

config router_access_control
	option 'enabled' '1'
	option 'dns' '1'
	option 'proxy' '1'

config lan_access_control
	option 'enabled' '1'
	option 'dns' '1'
	option 'proxy' '1'

config routing 'routing'
	option 'tproxy_fw_mark' '0x80'
	option 'tproxy_fw_mask' '0xFF'
	option 'tun_fw_mark' '0x81'
	option 'tun_fw_mask' '0xFF'
	option 'tproxy_rule_pref' '1024'
	option 'tun_rule_pref' '1025'
	option 'tproxy_route_table' '80'
	option 'tun_route_table' '81'
	option 'cgroup_id' '0x07250725'
	option 'cgroup_name' 'momo'
	option 'dummy_device' 'momo-dummy'

config log 'log'
	option 'clear_at_stop' '1'
	option 'scheduled_clear' '1'
	option 'scheduled_clear_cron' '*/5 * * * *'
	option 'scheduled_clear_mode' 'cycle'
	option 'scheduled_clear_weekday' '*'
	option 'scheduled_clear_time' '03:00'
	option 'scheduled_clear_interval' '5'
	option 'scheduled_clear_size_limit' '1'
	option 'scheduled_clear_size_limit_unit' 'MB'

config placeholder 'placeholder'
