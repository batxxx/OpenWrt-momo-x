name: release-packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag, for example v1.2.3. Leave empty to use momo-<run_number>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        branch:
          - openwrt-24.10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: momo
          PACKAGES: momo-full
          INDEX: 1
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          NO_REFRESH_CHECK: true

      - name: compress
        run: |
          tar -c -z -f momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz -C bin/packages/${{ matrix.arch }}/momo .
          mkdir -p public/${{ matrix.branch }}/${{ matrix.arch }}
          mv bin/packages/${{ matrix.arch }}/momo public/${{ matrix.branch }}/${{ matrix.arch }}
          tar -c -z -f feed_momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz public/${{ matrix.branch }}/${{ matrix.arch }}

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: feed_momo_${{ matrix.arch }}-${{ matrix.branch }}
          path: feed_momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || format('momo-{0}', github.run_number) }}
          name: Momo ${{ inputs.release_tag || format('momo-{0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ inputs.prerelease }}
          fail_on_unmatched_files: true
          files: |
            public/${{ matrix.branch }}/${{ matrix.arch }}/momo/*.ipk
            momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz
            feed_momo_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz
          body: |
            Momo packages for OpenWrt 24.10 x86_64.

            Install from the GitHub Pages feed:

            ```sh
            wget -O - https://github.com/batxxx/OpenWrt-momo-x/raw/refs/heads/main/install.sh | ash
            ```

  feed:
    needs: release
    name: feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: download
        uses: actions/download-artifact@v8
        with:
          pattern: feed_momo_*
          merge-multiple: true

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      - name: uncompress
        run: |
          for file in feed_momo_*.tar.gz; do
            tar -x -z -f "$file"
          done

      - name: prepare
        run: |
          touch public/.nojekyll
          echo "${{ secrets.KEY_BUILD_PUB }}" > public/key-build.pub
          echo "${{ secrets.PUBLIC_KEY }}" > public/public-key.pem
          tree --dirsfirst --sort name -P '*.ipk' --prune --noreport -H "" -T "Momo's Feed" --charset utf-8 -o public/index.html public
          sed -i '/<p class="VERSION">/,/<\/p>/d' public/index.html

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
