name: release-packages

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-packages.yml"
      - "scripts/make-feed-index.py"
      - "momo-x/**"
      - "momo-x-subconverter/**"
      - "momo-x-full/**"
      - "luci-app-momo/**"
      - "luci-i18n-momo-zh-cn/**"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "GitHub Release tag, for example v1.2.3. Leave empty to use momo-x-<run_number>."
        required: false
        type: string
      prerelease:
        description: "Mark the GitHub Release as a pre-release."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  release:
    name: ${{ matrix.arch }}-${{ matrix.branch }} release
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x86_64
        branch:
          - openwrt-24.10

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: build
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ matrix.arch }}-${{ matrix.branch }}
          FEEDNAME: momox
          PACKAGES: momo-x momo-x-subconverter luci-app-momo momo-x-full
          INDEX: 0
          KEY_BUILD: ${{ secrets.KEY_BUILD }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          BUILD_LOG: 1
          NO_REFRESH_CHECK: true
          NO_SHFMT_CHECK: true
          V: sc

      - name: upload build diagnostics
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: diagnostics_${{ matrix.arch }}-${{ matrix.branch }}
          path: |
            logs
            bin/packages/${{ matrix.arch }}/momox
          if-no-files-found: ignore

      - name: install feed tools
        run: |
          sudo apt-get update
          sudo apt-get install -y usign

      - name: create feed index
        run: |
          set -eu

          feed_dir="bin/packages/${{ matrix.arch }}/momox"
          python3 scripts/make-feed-index.py "$feed_dir"

          usign_bin=""
          for candidate in staging_dir/host/bin/usign ./staging_dir/host/bin/usign /builder/staging_dir/host/bin/usign; do
            if [ -x "$candidate" ]; then
              usign_bin="$candidate"
              break
            fi
          done
          if [ -z "$usign_bin" ]; then
            usign_bin="$(command -v usign || true)"
          fi
          if [ -z "$usign_bin" ]; then
            usign_bin="$(find . -path '*/bin/usign' -type f -perm -111 2>/dev/null | head -n 1 || true)"
          fi
          if [ -z "$usign_bin" ]; then
            echo "::error::usign not found after SDK build"
            exit 1
          fi
          if [ -z "${KEY_BUILD:-}" ]; then
            echo "::error::KEY_BUILD secret is missing"
            exit 1
          fi

          key_file="$(mktemp)"
          printf '%s' "$KEY_BUILD" > "$key_file"
          chmod 600 "$key_file"
          "$usign_bin" -S -m "$feed_dir/Packages" -s "$key_file" -x "$feed_dir/Packages.sig"
          rm -f "$key_file"
        env:
          KEY_BUILD: ${{ secrets.KEY_BUILD }}

      - name: compress
        run: |
          tar -c -z -f momo-x_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz -C bin/packages/${{ matrix.arch }}/momox .
          mkdir -p public/${{ matrix.branch }}/${{ matrix.arch }}/momo-x
          cp -a bin/packages/${{ matrix.arch }}/momox/. public/${{ matrix.branch }}/${{ matrix.arch }}/momo-x/
          tar -c -z -f feed_momo-x_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz public/${{ matrix.branch }}/${{ matrix.arch }}

      - name: upload
        uses: actions/upload-artifact@v7
        with:
          name: feed_momo-x_${{ matrix.arch }}-${{ matrix.branch }}
          path: feed_momo-x_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz

      - name: publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || format('momo-x-{0}', github.run_number) }}
          name: Momo-X ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || format('momo-x-{0}', github.run_number) }}
          target_commitish: ${{ github.sha }}
          prerelease: ${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || false }}
          fail_on_unmatched_files: true
          files: |
            public/${{ matrix.branch }}/${{ matrix.arch }}/momo-x/*.ipk
            momo-x_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz
            feed_momo-x_${{ matrix.arch }}-${{ matrix.branch }}.tar.gz
          body: |
            Momo-X packages for OpenWrt 24.10 x86_64.

            Install from the GitHub Pages feed:

            ```sh
            wget -O - https://github.com/batxxx/OpenWrt-momo-x/raw/refs/heads/main/install.sh | ash
            ```

  feed:
    needs: release
    name: feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: download
        uses: actions/download-artifact@v8
        with:
          pattern: feed_momo-x_*
          merge-multiple: true

      - name: install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      - name: uncompress
        run: |
          for file in feed_momo-x_*.tar.gz; do
            tar -x -z -f "$file"
          done

      - name: prepare
        run: |
          touch public/.nojekyll
          echo "${{ secrets.KEY_BUILD_PUB }}" > public/key-build.pub
          echo "${{ secrets.PUBLIC_KEY }}" > public/public-key.pem
          tree --dirsfirst --sort name -P '*.ipk' --prune --noreport -H "" -T "Momo-X Feed" --charset utf-8 -o public/index.html public
          sed -i '/<p class="VERSION">/,/<\/p>/d' public/index.html

      - name: configure pages
        uses: actions/configure-pages@v5

      - name: upload pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: public

      - name: deploy pages
        id: deployment
        uses: actions/deploy-pages@v4
